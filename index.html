<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte Ciudadano de Agua - La Rioja</title>
    <meta name="description" content="Aplicación para el reporte de incidentes de agua en la provincia de La Rioja, Argentina.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="map"></div>

    <div class="sidebar" id="sidebar">
        <header>
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="water-icon"><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"></path></svg>
                <h1>La Rioja <span>Agua</span></h1>
            </div>
            <p>Reporte de Incidentes Ciudadanos</p>
        </header>

        <form id="incident-form">
            <div class="form-group">
                <label for="problem-type">Tipo de Problema</label>
                <select id="problem-type" required>
                    <option value="" disabled selected>Seleccione una opción</option>
                    <option value="perdida">Pérdida de agua</option>
                    <option value="falta-presion">Falta de presión</option>
                    <option value="rotura-cano">Rotura de caño</option>
                    <option value="agua-turbia">Agua turbia</option>
                </select>
            </div>

            <div class="form-group">
                <label for="description">Descripción breve</label>
                <textarea id="description" placeholder="Describa el problema detalladamente..." required></textarea>
            </div>

            <div class="form-group">
                <label for="coordinates">Coordenadas</label>
                <div class="coord-container">
                    <input type="text" id="coordinates" readonly placeholder="Haga clic en el mapa" required>
                    <button type="button" id="get-location" title="Usar mi ubicación">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                    </button>
                </div>
            </div>

            <div id="geo-validation" class="validation-msg hidden">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                <span>Solo se permiten reportes dentro de La Rioja.</span>
            </div>

            <button type="submit" class="btn-submit">Enviar Reporte</button>
        </form>

        <footer>
            <p>© 2024 Aguas de La Rioja - Sistema de Gestión de Incidentes</p>
        </footer>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>
